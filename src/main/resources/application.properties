# Configuraciˇn de Base de Datos (Match con ASuServicio-db)
# -------------------------------------------------------------------
# Si no hay variables de entorno, usa los valores de tu Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ASuSevicio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sepc1012}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:docker123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# -------------------------------------------------------------------
# Cambiado ${update} por update directamente para evitar errores de placeholder
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seguridad - JWT
# -------------------------------------------------------------------
# IMPORTANTE: He puesto un valor por defecto para que el sistema arranque.
# En producciˇn, usa una variable de entorno JWT_SECRET real.
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# Configuraciˇn Adicional
# -------------------------------------------------------------------
spring.flyway.enabled=false
spring.main.allow-circular-references=true

# Perfil activo (Default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}