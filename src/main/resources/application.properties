# ===================================================================
# CONFIGURACION DE BASE DE DATOS
# ===================================================================
# Conecta con la DB de Railway o usa el localhost de Docker como respaldo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ASuSevicio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sepc1012}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:docker123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Necesario para algunas versiones de Railway/Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# SEGURIDAD - JWT
# ===================================================================
# Si no hay variable JWT_SECRET en Railway, usa esta por defecto (solo dev)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# ===================================================================
# CONFIGURACION ADICIONAL
# ===================================================================
spring.flyway.enabled=false
spring.main.allow-circular-references=true

# Puerto dinamico para Railway
server.port=${PORT:8080}

# Perfil activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}